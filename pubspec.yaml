name: langchain_showcase
description: "A Flutter app showcasing LangChain capabilities"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter
  
  # LangChain packages
  langchain: ^0.8.0
  langchain_openai: ^0.8.0
  langchain_google: ^0.7.0
  
  # UI enhancements
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  flutter_markdown: ^0.7.7
  
  # Utilities
  file_picker: ^8.1.7
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
  macos:
    generate: true
  windows:
    generate: true
  linux:
    generate: true
  image_path: "assets/icon.png"

flutter:
  uses-material-design: true
  
  assets:
    - assets/
